<script>
(function() {
  var STORAGE_KEY = 'noteify-theme';
  var COOKIE_KEY = 'noteify-theme';
  var root = document.documentElement;
  var toggleBtn = null;

  function setCookie(name, value, days) {
    var maxAge = days * 86400;
    document.cookie = name + '=' + encodeURIComponent(value) + '; Max-Age=' + maxAge + '; Path=/; SameSite=Lax';
  }

  function getTheme() {
    var theme = root.getAttribute('data-theme');
    return (theme === 'dark' || theme === 'light') ? theme : 'light';
  }

  function syncButton() {
    if (!toggleBtn) return;
    var isDark = getTheme() === 'dark';
    toggleBtn.setAttribute('aria-pressed', isDark ? 'true' : 'false');
    toggleBtn.setAttribute('title', isDark ? 'Switch to light mode' : 'Switch to dark mode');
    toggleBtn.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
  }

  function applyTheme(theme) {
    root.setAttribute('data-theme', theme);
    syncButton();
  }

  function toggleTheme() {
    var next = getTheme() === 'dark' ? 'light' : 'dark';
    try { localStorage.setItem(STORAGE_KEY, next); } catch (e) {}
    setCookie(COOKIE_KEY, next, 365);
    applyTheme(next);
  }

  function buildButton() {
    var btn = document.createElement('button');
    btn.id = 'dm-toggle';
    btn.type = 'button';
    btn.className = 'dm-toggle';
    btn.setAttribute('aria-pressed', 'false');
    btn.setAttribute('title', 'Switch to dark mode');
    btn.setAttribute('aria-label', 'Switch to dark mode');
    btn.innerHTML =
      '<svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">' +
        '<path d="M21 12.7A9 9 0 0 1 11.3 3a7 7 0 0 0 9.7 9.7z" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"/>' +
      '</svg>' +
      '<svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">' +
        '<circle cx="12" cy="12" r="4" fill="none" stroke="currentColor" stroke-width="1.7"/>' +
        '<path d="M12 2v3M12 19v3M4.2 4.2l2.1 2.1M17.7 17.7l2.1 2.1M2 12h3M19 12h3M4.2 19.8l2.1-2.1M17.7 6.3l2.1-2.1" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round"/>' +
      '</svg>';
    btn.addEventListener('click', toggleTheme);
    return btn;
  }

  function insertButton() {
    if (document.getElementById('dm-toggle')) {
      toggleBtn = document.getElementById('dm-toggle');
      syncButton();
      return;
    }

    toggleBtn = buildButton();

    var auxList = document.querySelector('.aux-nav-list');
    if (auxList) {
      var li = document.createElement('li');
      li.className = 'aux-nav-list-item';
      li.appendChild(toggleBtn);
      auxList.appendChild(li);
      syncButton();
      return;
    }

    var auxNav = document.querySelector('.aux-nav');
    if (auxNav) {
      auxNav.appendChild(toggleBtn);
      syncButton();
      return;
    }

    var header = document.querySelector('.site-header');
    if (header) {
      var wrap = document.createElement('div');
      wrap.className = 'dm-toggle-wrap';
      wrap.appendChild(toggleBtn);
      header.appendChild(wrap);
      syncButton();
    }
  }

  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', insertButton);
  } else {
    insertButton();
  }
})();
</script>
