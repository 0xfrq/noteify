title: PDF Viewer
nav_exclude: true
search_exclude: true
---

<style>
  #pdf-viewer-container {
    width: 100%;
    height: 80vh;
    position: relative;
    overflow: auto;
    background-color: #f7f7f7;
    border: 1px solid #ccc;
  }
  #pdf-render {
    width: 100%;
    display: block;
    margin: 0 auto;
  }
  .pdf-controls {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 10px;
    margin-bottom: 15px;
    padding: 10px;
    background: #eee;
    border-radius: 5px;
  }
  .pdf-controls button {
    padding: 5px 15px;
    cursor: pointer;
  }
</style>

<div class="pdf-controls">
  <button id="prev-page">Previous</button>
  <span id="page-num-indicator">Page: <span id="page-num"></span> / <span id="page-count"></span></span>
  <button id="next-page">Next</button>
  <button id="zoom-out">Zoom Out</button>
  <button id="zoom-in">Zoom In</button>
</div>

<div id="pdf-viewer-container">
  <canvas id="pdf-render"></canvas>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script>
  pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

  let pdfDoc = null,
      pageNum = 1,
      pageIsRendering = false,
      pageNumIsPending = null,
      scale = 1.5,
      canvas = document.getElementById('pdf-render'),
      ctx = canvas.getContext('2d');

  const urlParams = new URLSearchParams(window.location.search);
  let fileUrl = urlParams.get('file');

  if (!fileUrl) {
    fileUrl = '{{ site.baseurl }}/assets/materials/pcd/rendered/2notes.pdf'; // Example fallback
  }

  // Generate correct domain path if baseurl is set
  const baseurl = '{{ site.baseurl }}';
  if (fileUrl.startsWith('/assets')) {
     fileUrl = baseurl + fileUrl;
  }

  const renderPage = num => {
    pageIsRendering = true;

    pdfDoc.getPage(num).then(page => {
      const viewport = page.getViewport({ scale: scale });
      canvas.height = viewport.height;
      canvas.width = viewport.width;

      const renderCtx = {
        canvasContext: ctx,
        viewport: viewport
      };

      page.render(renderCtx).promise.then(() => {
        pageIsRendering = false;

        if (pageNumIsPending !== null) {
          renderPage(pageNumIsPending);
          pageNumIsPending = null;
        }
      });

      document.getElementById('page-num').textContent = num;
    });
  };

  const queueRenderPage = num => {
    if (pageIsRendering) {
      pageNumIsPending = num;
    } else {
      renderPage(num);
    }
  };

  const showPrevPage = () => {
    if (pageNum <= 1) return;
    pageNum--;
    queueRenderPage(pageNum);
  };

  const showNextPage = () => {
    if (pageNum >= pdfDoc.numPages) return;
    pageNum++;
    queueRenderPage(pageNum);
  };

  document.getElementById('prev-page').addEventListener('click', showPrevPage);
  document.getElementById('next-page').addEventListener('click', showNextPage);
  
  document.getElementById('zoom-in').addEventListener('click', () => {
    scale += 0.25;
    queueRenderPage(pageNum);
  });
  
  document.getElementById('zoom-out').addEventListener('click', () => {
    if(scale <= 0.5) return;
    scale -= 0.25;
    queueRenderPage(pageNum);
  });

  if (fileUrl) {
    pdfjsLib.getDocument(fileUrl).promise.then(pdfDoc_ => {
      pdfDoc = pdfDoc_;
      document.getElementById('page-count').textContent = pdfDoc.numPages;
      renderPage(pageNum);
    }).catch(err => {
      const div = document.createElement('div');
      div.className = 'error';
      div.appendChild(document.createTextNode('Error loading PDF: ' + err.message));
      document.getElementById('pdf-viewer-container').appendChild(div);
      console.error('Error loading PDF:', err);
    });
  }
</script>
