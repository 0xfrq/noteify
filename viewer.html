<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Viewer</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: #525659;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            display: block;
        }
    </style>
</head>
<body>
    <iframe id="pdf-frame" type="application/pdf"></iframe>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        let fileUrl = urlParams.get('file') || '{{ "/assets/materials/pcd/rendered/2notes.pdf" | relative_url }}';
        
        /* Handle relative URLs correctly according to Jekyll's baseurl */
        const baseurl = '{{ site.baseurl }}';
        if (fileUrl.startsWith('/assets')) {
            fileUrl = baseurl.replace(/\/$/, '') + fileUrl;
        }
        
        const frame = document.getElementById('pdf-frame');
        frame.src = fileUrl;
        document.title = fileUrl.split('/').pop() + " - PDF Viewer";
    </script>
</body>
</html>
